services:
  traefik:
    image: traefik:v2.10
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
    ports:
      - "80:80"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    restart: unless-stopped

  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-users}
      MYSQL_USER: ${DB_USER:-root}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    restart: unless-stopped

  backend:
    build: ./backend
    environment:
      PORT: 8000
      NODE_ENV: production
      DB_NAME: ${DB_NAME:-users}
      DB_USER: ${DB_USER:-root}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_HOST: mysql
      DB_DIALECT: mysql
      JWT_SECRET: ${JWT_SECRET}
      FRONTEND_URL: http://${DOMAIN}
    labels:
      - "traefik.enable=true"
      # Route any request starting with /api to the backend
      - "traefik.http.routers.backend.rule=PathPrefix(`/api`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "traefik.http.services.backend.loadbalancer.server.port=8000"

  frontend:
      build: ./frontend
      labels:
        - "traefik.enable=true"
      # This captures absolutely all traffic that doesn't go to /api
        - "traefik.http.routers.frontend.rule=HostRegexp(`{catchall:.*}`)"
        - "traefik.http.routers.frontend.entrypoints=web"
        - "traefik.http.services.frontend.loadbalancer.server.port=80"
      depends_on:
        - backend
      restart: unless-stopped

volumes:
  mysql-data:
