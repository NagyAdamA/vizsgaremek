services:
  mysql:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: users
      MYSQL_PASSWORD: rootpassword
    volumes:
      - mysql-data:/var/lib/mysql

  backend:
    build: ./backend
    environment:
      PORT: 8000
      NODE_ENV: production
      DB_NAME: users
      DB_USER: root
      DB_PASSWORD: rootpassword
      DB_DIALECT: mysql
      DB_HOST: mysql
      JWT_SECRET: something that is not guessable by brute force methods
      FRONTEND_URL: http://ijasz.vizsgaremek.hu
    ports:
      - "8000:8000"
    depends_on:
      - mysql

  frontend:
    build: ./frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  mysql-data:
